// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    maven { url 'https://maven.google.com' }
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    maven { url 'https://maven.google.com' }
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

def projectBuildToolsVersion = findProperty('android.buildToolsVersion') ?: '36.1.0'
ext.buildToolsVersion = projectBuildToolsVersion

subprojects { subproject ->
  subproject.plugins.withId('com.android.library') {
    subproject.android {
      buildToolsVersion projectBuildToolsVersion
    }
  }
  subproject.plugins.withId('com.android.application') {
    subproject.android {
      buildToolsVersion projectBuildToolsVersion
    }
  }
  subproject.afterEvaluate {
    if (subproject.plugins.hasPlugin('com.android.library') || subproject.plugins.hasPlugin('com.android.application')) {
      subproject.android.buildToolsVersion = projectBuildToolsVersion
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
