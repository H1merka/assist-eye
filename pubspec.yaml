name: assist_eye
description: >
  Мобильное приложение для помощи слабовидящим и незрячим пользователям.
  Голосовое управление, OCR, детекция объектов — всё работает офлайн.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- Управление состоянием (Command Processor) ---
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # --- Камера ---
  camera: ^0.10.5+9
  permission_handler: ^11.1.0

  # --- ASR (распознавание речи, офлайн) ---
  vosk_flutter: ^0.4.0

  # --- OCR ---
  google_mlkit_text_recognition: ^0.11.0
  # Fallback для устройств без GMS (например, Huawei):
  # flutter_tesseract_ocr: ^0.4.23

  # --- Детекция объектов и классификация купюр ---
  tflite_flutter: ^0.10.4
  tflite_flutter_helper: ^0.4.3

  # --- TTS (синтез речи) ---
  flutter_tts: ^4.0.2

  # --- Локальное хранилище ---
  sqflite: ^2.3.0
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.1

  # --- Обработка изображений (preprocessing перед inference) ---
  image: ^4.1.3

  # --- Утилиты ---
  intl: ^0.19.0
  sensors_plus: ^4.0.2        # Shake-to-activate
  vibration: ^1.8.4           # Тактильная обратная связь

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  bloc_test: ^9.1.5
  mocktail: ^1.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  generate: true               # Включает генерацию l10n

  assets:
    - assets/models/
    - assets/sounds/
